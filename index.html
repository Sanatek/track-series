<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Series</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:40px;
}

h1{
    font-size:48px;
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:220px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
}

.user{
    background:white;
    color:black;
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:300px;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
}

.delete{
    background:red;
    color:white;
}
</style>
</head>

<body>

<h1>Track Series</h1>
<p>موقع تتبع المسلسلات</p>

<input id="username" placeholder="اسم المستخدم">
<button onclick="addUser()">إضافة</button>

<div id="users"></div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

function renderUsers(){
    const container = document.getElementById("users");

    container.innerHTML = "";

    users.forEach((user,index)=>{
        container.innerHTML += `
        <div class="user">
            <span>${user}</span>
            <button class="delete" onclick="deleteUser(${index})">
                حذف
            </button>
        </div>
        `;
    });

    localStorage.setItem("users",JSON.stringify(users));
}

function addUser(){

    const input = document.getElementById("username");

    const name = input.value.trim();

    if(name==="") return;

    users.push(name);

    input.value="";

    renderUsers();
}

function deleteUser(index){

    users.splice(index,1);

    renderUsers();
}

renderUsers();

</script>

</body>
</html>
