<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snatek Time</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
min-height:100vh;
}

.screen{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.center{
text-align:center;
}

.logo{
font-size:55px;
font-weight:bold;
margin-bottom:30px;
}

.profiles{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.profile{
width:120px;
height:120px;
background:#1c1c1c;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

.addBtn{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:45px;
background:#252525;
color:white;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
}

.modalBox{
background:#1a1a1a;
padding:20px;
border-radius:16px;
width:320px;
}

.modalBox h2{
margin-bottom:15px;
}

.modalBox input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

.modalButtons{
display:flex;
gap:10px;
}

.modalButtons button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ok{
background:#2563eb;
color:white;
}

.cancel{
background:#333;
color:white;
}

#app{
display:none;
min-height:100vh;
padding-bottom:80px;
}

#pageContent{
padding:20px;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#181818;
border-top:1px solid #333;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:14px;
margin-top:12px;
}

.bigPlus{
width:70px;
height:70px;
border-radius:50%;
border:none;
font-size:35px;
background:#2563eb;
color:white;
margin-top:20px;
}
.seriesItem{
background:#1c1c1c;
padding:15px;
border-radius:14px;
margin-top:10px;
font-size:18px;
}
</style>
</head>

<body>

<div id="profileScreen" class="screen">

<div class="center">

<div class="logo">
Snatek Time
</div>

<div id="profiles" class="profiles"></div>

<button class="addBtn" onclick="openModal()">
+
</button>

</div>

</div>

<div id="app">

<div id="pageContent"></div>

<div class="bottomNav">

<button onclick="showHome()">🏠</button>

<button onclick="showWatching()">📺</button>

<button onclick="showSearch()">🔍</button>

<button onclick="showProfile()">👤</button>

</div>

</div>

<div id="modal" class="modal">

<div class="modalBox">

<h2>إضافة بروفايل</h2>

<input
id="profileName"
placeholder="اكتب الاسم"
>

<div class="modalButtons">

<button class="ok" onclick="createProfile()">
تمام
</button>

<button class="cancel" onclick="closeModal()">
إلغاء
</button>

</div>

</div>

<script>

let profiles =
JSON.parse(localStorage.getItem("profiles")) || [];

let currentProfile = "";
  let seriesData =
JSON.parse(localStorage.getItem("seriesData")) || {};

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("profileName").value="";
}

function saveProfiles(){
localStorage.setItem(
"profiles",
JSON.stringify(profiles)
);
}

function renderProfiles(){

const container =
document.getElementById("profiles");

container.innerHTML="";

profiles.forEach(name=>{

const div =
document.createElement("div");

div.className="profile";

div.textContent=name;

div.onclick=()=>{

currentProfile=name;

document.getElementById("profileScreen")
.style.display="none";

document.getElementById("app")
.style.display="block";

showHome();

};

container.appendChild(div);

});

}

function createProfile(){

const input =
document.getElementById("profileName");

const name =
input.value.trim();

if(!name) return;

profiles.push(name);

saveProfiles();

renderProfiles();

closeModal();

}

function showHome(){

document.getElementById("pageContent")
.innerHTML=`

<h1>مرحباً ${currentProfile}</h1>

<div class="card">
آخر مسلسل تمت مشاهدته
</div>

<div class="card">
عدد المسلسلات: 0
</div>

`;

}

function showWatching(){

if(!seriesData[currentProfile]){
seriesData[currentProfile]=[];
}

let html = `
<h1>مسلسلاتي</h1>
`;

if(seriesData[currentProfile].length===0){

html += `
<div class="card">
لا يوجد مسلسلات حالياً
</div>
`;

}else{

seriesData[currentProfile].forEach(series=>{

html += `
<div class="seriesItem">
${series}
</div>
`;

});

}

html += `
<button class="bigPlus"
onclick="addSeries()">
+
</button>
`;

document.getElementById("pageContent")
.innerHTML = html;

}

document.getElementById("pageContent")
.innerHTML=`

<h1>مسلسلاتي</h1>

<div class="card">
لا توجد مسلسلات حالياً
</div>

<button class="bigPlus">
+
</button>

`;

}

function showSearch(){

document.getElementById("pageContent")
.innerHTML=`

<h1>البحث</h1>

<div class="card">
سيتم إضافة البحث لاحقاً
</div>

`;

}

function showProfile(){

document.getElementById("pageContent")
.innerHTML=`

<h1>${currentProfile}</h1>

<div class="card">
عدد المسلسلات: 0
</div>

<div class="card">
عدد الحلقات: 0
</div>

<div class="card">
وقت المشاهدة: 0 ساعة
</div>

`;

}
function addSeries(){

let name =
prompt("اسم المسلسل");

if(!name) return;

if(!seriesData[currentProfile]){
seriesData[currentProfile]=[];
}

seriesData[currentProfile].push(name);

localStorage.setItem(
"seriesData",
JSON.stringify(seriesData)
);

showWatching();

}
renderProfiles();

</script>

  </body>
</html>
