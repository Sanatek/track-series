<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Series</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

header{
    text-align:center;
    padding:40px 20px;
}

h1{
    font-size:42px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

button{
    background:#4f46e5;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <h1>Track Series</h1>
    <p>تابع تقدمك في المسلسلات مع أصدقائك</p>
</header>

<div class="container">

    <div class="card">
        <h2>Breaking Bad</h2>
        <p>آخر حلقة شاهدتها: S2E5</p>
        <button>تحديث التقدم</button>
    </div>

    <div class="card">
        <h2>Game of Thrones</h2>
        <p>آخر حلقة شاهدتها: S5E3</p>
        <button>تحديث التقدم</button>
    </div>

</div>

</body>
</html>
