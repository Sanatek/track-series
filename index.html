<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snatek Time</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
min-height:100vh;
}

.screen{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.center{
text-align:center;
}

.logo{
font-size:50px;
font-weight:bold;
margin-bottom:30px;
}

.profiles{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.profile{
width:120px;
height:120px;
background:#1c1c1c;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

.addBtn{
width:90px;
height:90px;
border-radius:50%;
border:none;
font-size:45px;
background:#252525;
color:white;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
}

.modalBox{
background:#1a1a1a;
padding:20px;
border-radius:16px;
width:320px;
}

.modalBox input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
margin-bottom:15px;
}

.modalButtons{
display:flex;
gap:10px;
}

.modalButtons button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
}

.ok{
background:#2563eb;
color:white;
}

.cancel{
background:#333;
color:white;
}

#app{
display:none;
min-height:100vh;
padding-bottom:80px;
}

#pageContent{
padding:20px;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#181818;
border-top:1px solid #333;
display:flex;
justify-content:space-around;
align-items:center;
}

.bottomNav button{
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:14px;
margin-top:12px;
}

.seriesItem{
background:#1c1c1c;
padding:12px;
border-radius:14px;
margin-top:12px;
}

.poster{
width:80px;
height:120px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<div id="profileScreen" class="screen">
<div class="center">

<div class="logo">
Snatek Time
</div>

<div id="profiles" class="profiles"></div>

<button class="addBtn" onclick="openModal()">
+
</button>

</div>
</div>

<div id="app">

<div id="pageContent"></div>

<div class="bottomNav">
<button onclick="showHome()">🏠</button>
<button onclick="showWatching()">📺</button>
<button onclick="showSearch()">🔍</button>
<button onclick="showProfile()">👤</button>
</div>

</div>

<div id="modal" class="modal">
<div class="modalBox">

<h2>إضافة بروفايل</h2>

<input id="profileName" placeholder="اكتب الاسم">

<div class="modalButtons">
<button class="ok" onclick="createProfile()">تمام</button>
<button class="cancel" onclick="closeModal()">إلغاء</button>
</div>

</div>
</div>

<script>

let profiles =
JSON.parse(localStorage.getItem("profiles")) || [];

let currentProfile = "";

let seriesData =
JSON.parse(localStorage.getItem("seriesData")) || {};

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("profileName").value="";
}

function saveProfiles(){
localStorage.setItem(
"profiles",
JSON.stringify(profiles)
);
}

function renderProfiles(){

const container =
document.getElementById("profiles");

container.innerHTML="";

profiles.forEach(name=>{

const div =
document.createElement("div");

div.className="profile";

div.textContent=name;

div.onclick=()=>{

currentProfile=name;

document.getElementById("profileScreen")
.style.display="none";

document.getElementById("app")
.style.display="block";

showHome();

};

container.appendChild(div);

});

}

function createProfile(){

const name =
document.getElementById("profileName")
.value.trim();

if(!name) return;

profiles.push(name);

saveProfiles();

renderProfiles();

closeModal();

}

function showHome(){

document.getElementById("pageContent").innerHTML = `
<h1>مرحباً ${currentProfile}</h1>

<div class="card">
عدد المسلسلات:
${seriesData[currentProfile] ? seriesData[currentProfile].length : 0}
</div>
`;
}
  function showWatching(){

if(!seriesData[currentProfile]){
seriesData[currentProfile]=[];
}

let html = `
<h1>مسلسلاتي</h1>
`;

if(seriesData[currentProfile].length===0){

html += `
<div class="card">
لا يوجد مسلسلات حالياً
</div>
`;

}else{

seriesData[currentProfile].forEach(series=>{

const poster =
series.poster
? `https://image.tmdb.org/t/p/w300${series.poster}`
: "";

html += `

<div
class="seriesItem"
onclick="openSeries(${series.id})"
style="
display:flex;
gap:15px;
align-items:center;
cursor:pointer;
"
>

${poster ? `
<img
src="${poster}"
class="poster"
>
` : ""}

<div>

<b>${series.name}</b>

<br><br>

الموسم ${series.season}
<br>
الحلقة ${series.episode}

</div>

</div>

`;

});

}

document.getElementById("pageContent").innerHTML = html;

}

function showSearch(){

document.getElementById("pageContent").innerHTML = `

<h1>البحث</h1>

<input
id="searchInput"
placeholder="ابحث عن مسلسل"
style="
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
background:#1c1c1c;
color:white;
"
oninput="searchSeries()"
>

<div id="searchResults"></div>

`;

}

function showProfile(){

document.getElementById("pageContent").innerHTML = `

<h1>${currentProfile}</h1>

<div class="card">
عدد المسلسلات:
${seriesData[currentProfile]
? seriesData[currentProfile].length
: 0}
</div>

`;

}

async function searchSeries(){

const query =
document.getElementById("searchInput")
.value.trim();

if(query.length < 2){

document.getElementById(
"searchResults"
).innerHTML = "";

return;

}

try{

const response = await fetch(
`https://api.themoviedb.org/3/search/tv?api_key=265d9e344b0ec6f4902c4132f543c3f4&query=${encodeURIComponent(query)}`
);

const data =
await response.json();

let html = "";

data.results
.slice(0,10)
.forEach(show=>{

const poster =
show.poster_path
? `https://image.tmdb.org/t/p/w300${show.poster_path}`
: "";

html += `

<div class="card">

${poster ? `
<img
src="${poster}"
class="poster"
>
` : ""}

<h3>${show.name}</h3>

<button
onclick="addSeriesFromSearch(
${show.id},
'${show.name.replace(/'/g,"\\'")}',
'${show.poster_path || ""}'
)"
style="
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
"
>
➕ إضافة
</button>

</div>

`;

});

document.getElementById(
"searchResults"
).innerHTML = html;

}catch(error){

document.getElementById(
"searchResults"
).innerHTML =
'<div class="card">فشل البحث</div>';

}

}

function addSeriesFromSearch(
id,
name,
poster
){

if(!seriesData[currentProfile]){
seriesData[currentProfile]=[];
}

const exists =
seriesData[currentProfile]
.find(
s => s.id === id
);

if(exists){
alert("المسلسل موجود مسبقاً");
return;
}

seriesData[currentProfile]
.push({
id:id,
name:name,
poster:poster,
season:1,
episode:1
});

localStorage.setItem(
"seriesData",
JSON.stringify(seriesData)
);

showWatching();

}

async function openSeries(seriesId){

const series =
seriesData[currentProfile]
.find(
s => s.id === seriesId
);

if(!series) return;

document.getElementById(
"pageContent"
).innerHTML =
'<div class="card">جاري التحميل...</div>';

try{

const response =
await fetch(
`https://api.themoviedb.org/3/tv/${series.id}?api_key=265d9e344b0ec6f4902c4132f543c3f4`
);

const data =
await response.json();

let seasonsHtml = "";

data.seasons.forEach(season=>{

if(
season.season_number === 0
) return;

seasonsHtml += `

<div
class="card"
onclick="
openSeason(
${series.id},
${season.season_number}
)"
style="cursor:pointer;"
>

الموسم
${season.season_number}

<br>

عدد الحلقات:
${season.episode_count}

</div>

`;

});

document.getElementById(
"pageContent"
).innerHTML = `

<h1>${series.name}</h1>

${seasonsHtml}

`;

}catch(error){

document.getElementById(
"pageContent"
).innerHTML =
'<div class="card">فشل التحميل</div>';

}

}
